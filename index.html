<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>暖记 - WarmBook</title>

  <!-- PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#E8734A">
  <meta name="description" content="暖记 - 一款温暖的智能记账应用">

  <!-- PWA Manifest & Service Worker -->
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png?v=6">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (registration) {
            console.log('Service Worker 注册成功，作用域:', registration.scope);
          })
          .catch(function (error) {
            console.log('Service Worker 注册失败:', error);
          });
      });
    }
  </script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css?v=8">
</head>
<body>

  <!-- 加载动画 -->
  <div id="loading-screen">
    <div class="loading-spinner">
      <div class="spinner-coin"></div>
      <p class="loading-text">暖记加载中...</p>
    </div>
  </div>

  <!-- 应用头部 -->
  <header class="app-header">
    <h1 class="app-title">
      <img src="icon-192.png" alt="暖记" class="app-title-icon">
    </h1>
    <button id="lang-toggle-btn" class="lang-toggle-btn" aria-label="切换语言">
      <span class="lang-label" id="current-lang-label">中/EN</span>
    </button>
  </header>

  <!-- 主内容区域 -->
  <main id="app-content">

    <!-- 首页 -->
    <section id="home-page" class="page active" data-page="home">
      <div class="page-inner">
        <!-- 首页内容将由 JS 动态渲染 -->
      </div>
    </section>

    <!-- 记账页 -->
    <section id="record-page" class="page" data-page="record">
      <div class="page-inner">
        <!-- 记账内容将由 JS 动态渲染 -->
      </div>
    </section>

    <!-- 预算页 -->
    <section id="budget-page" class="page" data-page="budget">
      <div class="page-inner">
        <!-- 预算内容将由 JS 动态渲染 -->
      </div>
    </section>

    <!-- 分析页 -->
    <section id="analysis-page" class="page" data-page="analysis">
      <div class="page-inner">
        <!-- 分析内容将由 JS 动态渲染 -->
      </div>
    </section>

    <!-- 设置页 -->
    <section id="settings-page" class="page" data-page="settings">
      <div class="page-inner">
        <!-- 设置内容将由 JS 动态渲染 -->
      </div>
    </section>

  </main>

  <!-- 底部导航 -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-target="home-page">
      <span class="nav-icon">🏠</span>
      <span class="nav-label" data-i18n="nav.home">首页</span>
    </button>
    <button class="nav-btn" data-target="record-page">
      <span class="nav-icon">📝</span>
      <span class="nav-label" data-i18n="nav.record">记账</span>
    </button>
    <button class="nav-btn" data-target="budget-page">
      <span class="nav-icon">💰</span>
      <span class="nav-label" data-i18n="nav.budget">预算</span>
    </button>
    <button class="nav-btn" data-target="analysis-page">
      <span class="nav-icon">📊</span>
      <span class="nav-label" data-i18n="nav.analysis">分析</span>
    </button>
    <button class="nav-btn" data-target="settings-page">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label" data-i18n="nav.settings">设置</span>
    </button>
  </nav>

  <!-- 快速记账面板 -->
  <div id="quick-record-overlay" class="modal-overlay" style="display:none;" onclick="App.closeQuickRecord()"></div>
  <div id="quick-record-panel" class="quick-record-panel" style="display:none;">
    <div class="quick-record-header">
      <span class="quick-record-title">快速记账</span>
      <button class="quick-record-close" onclick="App.closeQuickRecord()">✕</button>
    </div>
    <div class="quick-record-body">
      <div class="quick-amount-display" id="quick-amount-display">0.00</div>
      <div class="quick-categories" id="quick-categories"></div>
      <div class="quick-numpad" id="quick-numpad"></div>
      <button class="quick-save-btn" onclick="App.saveQuickRecord()">保存</button>
    </div>
  </div>

  <!-- Scripts（按顺序加载） -->
  <script src="js/i18n.js?v=8"></script>
  <script src="js/icons.js?v=8"></script>
  <script src="js/data.js?v=8"></script>
  <script src="js/components.js?v=8"></script>
  <script src="js/charts.js?v=8"></script>
  <script src="js/app.js?v=8"></script>

  <!-- 加载动画样式（内联，确保加载时即生效） -->
  <style>
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #FFF5ED;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .loading-spinner {
      text-align: center;
    }
    .spinner-coin {
      width: 56px;
      height: 56px;
      margin: 0 auto 18px auto;
      border: 4px solid rgba(232, 115, 74, 0.2);
      border-top-color: #E8734A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text {
      color: #E8734A;
      font-size: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- 加载动画控制 -->
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        var loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.classList.add('hidden');
          setTimeout(function () {
            loadingScreen.style.display = 'none';
          }, 400);
        }
      }, 600);
    });
  </script>

</body>
</html>
